networks:
  registry:
    external: false

services:

  registry:
    container_name: "registry_web"
    image: registry:2.6
    # Bind to all interfaces so registry is reachable via localhost and Tailscale
    ports:
      - "0.0.0.0:5000:5000"
    environment:
      REGISTRY_HTTP_ADDR: :5000
#      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/docker.me.intern.crt
#      REGISTRY_HTTP_TLS_KEY: /certs/docker.me.intern.key
      REGISTRY_STORAGE: filesystem
      REGISTRY_STORAGE_DELETE_ENABLED: 'true'
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - /root/docker-public/registry/data:/var/lib/registry
      - /root/docker-public/registry/certs:/certs
      - /root/docker-public/registry/config/config.yml:/etc/docker/registry/config.yml
    restart: always
    logging:
      driver: "json-file"
      options:
        "max-size": "10m"
        "max-file": "5"
    networks:
      - registry

  registry-ui:
    container_name: "registry_ui"
    image: joxit/docker-registry-ui:2
    # Only listen on Tailscale interface (not localhost)
    ports:
      - "100.81.148.52:80:80"
    environment:
      SINGLE_REGISTRY: "true"
      REGISTRY_TITLE: "Docker Registry"
      REGISTRY_URL: "http://registry:5000"
      NGINX_PROXY_PASS_URL: "http://registry:5000"
      REGISTRY_SECURED: "false"
      DELETE_IMAGES: "true"
      SHOW_CONTENT_DIGEST: "true"
      CATALOG_ELEMENTS_LIMIT: "1000"
    depends_on:
      - registry
    restart: always
    networks:
      - registry