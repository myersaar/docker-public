networks:
  registry:
    external: false
  proxy-net:
    external: true

services:

  registry:
    container_name: "registry_web"
    image: registry:2.6
    # Bind to all interfaces so registry is reachable via localhost and Tailscale
    ports:
      - "0.0.0.0:5000:5000"
    environment:
      REGISTRY_HTTP_ADDR: ":5000"
#      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/docker.me.intern.crt
#      REGISTRY_HTTP_TLS_KEY: /certs/docker.me.intern.key
      REGISTRY_STORAGE: filesystem
      REGISTRY_STORAGE_DELETE_ENABLED: 'true'
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      # Allow the browser UI origin; set this to your Cloudflare hostname in .env.
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: "[${REGISTRY_UI_PUBLIC_URL:-http://localhost:5080}]"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: '[HEAD,GET,OPTIONS,DELETE]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Credentials: '[true]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: '[Authorization,Accept,Cache-Control]'
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: '[Docker-Content-Digest]'
    volumes:
      - /root/docker-public/docker-registry/data:/var/lib/registry
      - /root/docker-public/docker-registry/certs:/certs
      - /root/docker-public/docker-registry/config/config.yml:/etc/docker/registry/config.yml
    restart: always
    logging:
      driver: "json-file"
      options:
        "max-size": "10m"
        "max-file": "5"
    networks:
      - registry
      - proxy-net

  registry-ui:
    container_name: "registry_ui"
    image: joxit/docker-registry-ui:2
    # Keep the UI local by default; Cloudflare can reach it over proxy-net.
    ports:
      - "${REGISTRY_UI_BIND_ADDR:-127.0.0.1}:5080:80"
    environment:
      SINGLE_REGISTRY: "true"
      REGISTRY_TITLE: "Docker Registry"
      # Use same-origin so browser API calls go through the UI proxy (avoids CORS).
      REGISTRY_URL: "${REGISTRY_UI_PUBLIC_URL:-http://localhost:5080}"
      NGINX_PROXY_PASS_URL: "http://registry:5000"
      REGISTRY_SECURED: "false"
      DELETE_IMAGES: "true"
      SHOW_CONTENT_DIGEST: "true"
      CATALOG_ELEMENTS_LIMIT: "1000"
    depends_on:
      - registry
    restart: always
    networks:
      - registry
      - proxy-net