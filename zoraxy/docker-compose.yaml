  zoraxy:
    image: zoraxydocker/zoraxy:latest
    container_name: zoraxy
    restart: unless-stopped
    ports:
      - 80:80      # public site HTTP
      - 443:443    # public site HTTPS
#      - 8001:8000  # optional host access for admin
    volumes:
      - /root/docker-public/zoraxy/config/:/opt/zoraxy/config/
      - /root/docker-public/zoraxy/plugin/:/opt/zoraxy/plugin/
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FASTGEOIP: "true"
    networks:
      - zoraxy_default

networks:
  zoraxy_default:
    driver: bridge